spring.application.name=pagos

# Optional datasource configuration (read from environment variables).
# Example: set DB_URL, DB_USER, DB_PASS, DB_DRIVER and JPA_DDL_AUTO in your environment or .env file.
spring.datasource.url=${DB_URL:jdbc:h2:mem:pagosdb}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
